<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@300;400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0b0d;color:#e2e8f0;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#0f1115;border:1px solid #2a2f3d;border-radius:12px;padding:40px;width:100%;max-width:400px}
  .logo{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:#3b82f6;letter-spacing:4px;text-align:center;margin-bottom:8px}
  .sub{text-align:center;font-size:12px;color:#64748b;margin-bottom:32px;font-family:'IBM Plex Mono',monospace}
  label{display:block;font-size:11px;color:#94a3b8;margin-bottom:6px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1px}
  input{width:100%;background:#13161c;border:1px solid #2a2f3d;color:#e2e8f0;padding:10px 12px;border-radius:6px;font-size:13px;font-family:'IBM Plex Mono',monospace;outline:none;transition:border-color .15s;margin-bottom:16px}
  input:focus{border-color:#3b82f6}
  .btn{width:100%;background:#1d4ed8;color:#fff;border:none;padding:11px;border-radius:6px;font-size:13px;font-weight:600;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;cursor:pointer;transition:background .15s;margin-top:8px}
  .btn:hover{background:#3b82f6}
  .err{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#ef4444;padding:10px 12px;border-radius:6px;font-size:12px;font-family:'IBM Plex Mono',monospace;margin-bottom:16px;display:none}
  .link{text-align:center;margin-top:20px;font-size:12px;color:#64748b}
  .link a{color:#3b82f6;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">NEXUS</div>
  <div class="sub">Unified Trading Terminal</div>
  <div class="err" id="err"></div>
  <label>Email</label>
  <input type="email" id="email" placeholder="trader@example.com" value="admin@nexus.com">
  <label>Password</label>
  <input type="password" id="pass" placeholder="••••••••" value="admin1234">
  <button class="btn" onclick="doLogin()">LOGIN →</button>
  <div class="link">No account? <a href="/api/auth/register/">Register</a></div>
</div>
<script>
async function doLogin() {
  const email = document.getElementById('email').value;
  const pass  = document.getElementById('pass').value;
  const errEl = document.getElementById('err');
  errEl.style.display = 'none';
  try {
    const r = await fetch('/api/auth/login/', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password: pass})
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Login failed');
    localStorage.setItem('access',  d.access);
    localStorage.setItem('refresh', d.refresh);
    window.location.href = '/';
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}
document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
