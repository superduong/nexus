version: '3.9'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  web:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  celery:
    build: .
    command: celery -A workers.celery_app worker -l info
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  celery-beat:
    build: .
    command: celery -A workers.celery_app beat -l info
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped
