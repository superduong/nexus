# Render Blueprint — https://render.com/docs/infrastructure-as-code
# Dashboard → New → Blueprint → chọn repo có file này.
#
# Gói free: KHÔNG hỗ trợ Background Worker — Celery worker/beat cần plan trả phí (Starter+)
# hoặc chạy worker trên máy khác. API + Postgres + Redis vẫn chạy bình thường.

databases:
  - name: nexus-db
    databaseName: nexus
    plan: free

services:
  - type: keyvalue
    name: nexus-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: nexus-web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health/
    # Free tier: không dùng được preDeployCommand — migrate DB xem Dockerfile (alembic trước uvicorn)
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: SEED_ADMIN_ON_EMPTY_DB
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: nexus-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: nexus-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: nexus-redis
          property: connectionString
      # Đặt trong Dashboard sau khi deploy (domain thật của bạn):
      # CORS_ALLOWED_ORIGINS=https://nexus-web.onrender.com
      # BINANCE_API_KEY / BINANCE_SECRET / OKX_* nếu cần
